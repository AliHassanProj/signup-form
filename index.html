<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --ink: #0f0e0d;
      --cream: #f5f0e8;
      --warm: #e8dfd0;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --rust: #b85c38;
      --dark-surface: #1a1814;
      --card-bg: #ffffff;
      --shadow: 0 20px 60px rgba(0,0,0,0.12);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--cream);
      background-image:
        radial-gradient(circle at 20% 20%, rgba(201,168,76,0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(184,92,56,0.06) 0%, transparent 50%);
      min-height: 100vh;
      padding: 3rem 1rem;
      color: var(--ink);
    }

    /* ── Page header ── */
    .page-header {
      text-align: center;
      margin-bottom: 3rem;
    }
    .page-header .eyebrow {
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.5rem;
    }
    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 700;
      color: var(--ink);
      line-height: 1.1;
    }
    .page-header .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-top: 1rem;
    }
    .page-header .divider span {
      display: block;
      width: 48px;
      height: 1px;
      background: var(--gold);
      opacity: 0.6;
    }
    .page-header .divider i { color: var(--gold); font-size: 0.5rem; }

    /* ── Form card ── */
    .form-card {
      background: var(--card-bg);
      border-radius: 2px;
      box-shadow: var(--shadow), inset 0 0 0 1px rgba(201,168,76,0.15);
      padding: 2.5rem 2.5rem 2rem;
      position: relative;
      overflow: hidden;
    }
    .form-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--gold), var(--rust), var(--gold));
    }

    /* ── Floating label overrides ── */
    .form-floating label {
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: #888;
    }
    .form-floating > .form-control,
    .form-floating > .form-control:focus,
    .form-floating > textarea {
      border: 1px solid #e0d9cf;
      border-radius: 2px;
      background: #fdfcfa;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--ink);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-floating > .form-control:focus,
    .form-floating > textarea:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.12);
      background: #fff;
    }
    textarea.form-control { resize: none; }

    /* ── File upload zone ── */
    .upload-zone {
      border: 1.5px dashed #d4c9b5;
      border-radius: 2px;
      background: #fdfcfa;
      padding: 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }
    .upload-zone:hover { border-color: var(--gold); background: #fffef9; }
    .upload-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .upload-zone .upload-icon {
      font-size: 1.8rem;
      margin-bottom: 0.4rem;
      display: block;
    }
    .upload-zone .upload-text {
      font-size: 0.82rem;
      color: #888;
      font-weight: 400;
    }
    .upload-zone .upload-text strong { color: var(--gold); font-weight: 600; }
    #preview-thumb {
      width: 56px; height: 56px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--gold);
      display: none;
      margin: 0.5rem auto 0;
    }

    /* ── Submit button ── */
    .btn-submit {
      background: var(--ink);
      color: var(--cream);
      border: none;
      border-radius: 2px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.85rem 2rem;
      width: 100%;
      position: relative;
      overflow: hidden;
      transition: background 0.25s, transform 0.1s;
    }
    .btn-submit::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(201,168,76,0.18) 50%, transparent 100%);
      transform: translateX(-100%);
      transition: transform 0.5s ease;
    }
    .btn-submit:hover { background: #2a2620; transform: translateY(-1px); }
    .btn-submit:hover::after { transform: translateX(100%); }
    .btn-submit:active { transform: translateY(0); }

    /* ── Section label ── */
    .field-group-label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.75rem;
      display: block;
    }

    /* ── Result card ── */
    #result-section { display: none; }
    #result-section .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      color: var(--ink);
      margin-bottom: 1.5rem;
      position: relative;
      padding-bottom: 0.6rem;
    }
    #result-section .section-title::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0;
      width: 40px; height: 2px;
      background: var(--gold);
    }

    .profile-card {
      background: var(--dark-surface);
      border-radius: 2px;
      overflow: hidden;
      box-shadow: var(--shadow);
      animation: cardReveal 0.5s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes cardReveal {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .profile-card .card-banner {
      height: 80px;
      background: linear-gradient(135deg, #1a1410 0%, #2e2418 50%, #1a1410 100%);
      position: relative;
    }
    .profile-card .card-banner::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 10px,
        rgba(201,168,76,0.04) 10px,
        rgba(201,168,76,0.04) 11px
      );
    }

    .profile-card .avatar-wrap {
      width: 80px; height: 80px;
      border-radius: 50%;
      border: 3px solid var(--gold);
      overflow: hidden;
      position: absolute;
      bottom: -40px; left: 1.75rem;
      background: #2a2620;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .profile-card .avatar-wrap img {
      width: 100%; height: 100%; object-fit: cover;
    }
    .profile-card .avatar-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: var(--gold);
      background: #2a2620;
    }

    .profile-card .card-body {
      padding: 3rem 1.75rem 1.75rem;
      color: #f0ece4;
    }
    .profile-card .card-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: #f5f0e8;
      line-height: 1.2;
      margin-bottom: 0.2rem;
    }
    .profile-card .card-email {
      font-size: 0.8rem;
      color: var(--gold-light);
      letter-spacing: 0.03em;
      margin-bottom: 1.5rem;
    }

    .profile-card .info-grid {
      display: grid;
      gap: 1rem;
    }
    .profile-card .info-item {}
    .profile-card .info-label {
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.2rem;
    }
    .profile-card .info-value {
      font-size: 0.9rem;
      color: #c8bfaf;
      font-weight: 300;
      line-height: 1.5;
    }
    .profile-card .info-value.empty { color: #5a5248; font-style: italic; }

    .profile-card .card-footer-bar {
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 1rem 1.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .badge-registered {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: rgba(201,168,76,0.15);
      color: var(--gold-light);
      border: 1px solid rgba(201,168,76,0.3);
      padding: 0.25rem 0.6rem;
      border-radius: 1px;
    }
    .timestamp {
      font-size: 0.7rem;
      color: #5a5248;
      margin-left: auto;
    }
  </style>
</head>
<body>

<div class="container" style="max-width:640px;">

  <!-- Header -->
  <div class="page-header">
    <p class="eyebrow">Create Account</p>
    <h1>Join Us Today</h1>
    <div class="divider">
      <span></span>
      <svg width="6" height="6" viewBox="0 0 6 6"><rect x="1" y="1" width="4" height="4" fill="#c9a84c" transform="rotate(45 3 3)"/></svg>
      <span></span>
    </div>
  </div>

  <!-- Form -->
  <div class="form-card mb-4">
    <form id="signup-form" novalidate>

      <!-- Personal -->
      <span class="field-group-label">Personal Info</span>
      <div class="row g-3 mb-3">
        <div class="col-12">
          <div class="form-floating">
            <input type="text" class="form-control" id="name" placeholder="Full Name" required/>
            <label for="name">Full Name *</label>
          </div>
        </div>
        <div class="col-12">
          <div class="form-floating">
            <input type="email" class="form-control" id="email" placeholder="Email" required/>
            <label for="email">Email Address *</label>
          </div>
        </div>
      </div>

      <!-- Contact -->
      <span class="field-group-label mt-2">Contact</span>
      <div class="row g-3 mb-3">
        <div class="col-12">
          <div class="form-floating">
            <input type="tel" class="form-control" id="phone" placeholder="Phone"/>
            <label for="phone">Phone (optional)</label>
          </div>
        </div>
        <div class="col-12">
          <div class="form-floating">
            <textarea class="form-control" id="address" placeholder="Address" style="height:100px"></textarea>
            <label for="address">Address</label>
          </div>
        </div>
      </div>

      <!-- Photo -->
      <span class="field-group-label mt-2">Profile Photo</span>
      <div class="upload-zone mb-4">
        <input type="file" id="photo" accept="image/*"/>
        <span class="upload-icon">📷</span>
        <p class="upload-text mb-0"><strong>Click to upload</strong> or drag & drop<br>PNG, JPG, GIF up to 10MB</p>
        <img id="preview-thumb" alt="preview"/>
      </div>

      <button type="submit" class="btn-submit">REGISTER NOW</button>
    </form>
  </div>

  <!-- Result -->
  <div id="result-section" class="mb-5">
    <p class="section-title">Your Profile</p>
    <div class="profile-card">
      <div class="card-banner" style="position:relative;">
        <div class="avatar-wrap" id="avatar-wrap"></div>
      </div>
      <div class="card-body">
        <h2 class="card-name" id="card-name"></h2>
        <p class="card-email" id="card-email"></p>
        <div class="info-grid">
          <div class="info-item" id="phone-item">
            <p class="info-label">Phone</p>
            <p class="info-value" id="card-phone"></p>
          </div>
          <div class="info-item" id="address-item">
            <p class="info-label">Address</p>
            <p class="info-value" id="card-address"></p>
          </div>
        </div>
      </div>
      <div class="card-footer-bar">
        <span class="badge-registered">✓ Registered</span>
        <span class="timestamp" id="card-time"></span>
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Live photo preview
  const photoInput = document.getElementById('photo');
  const previewThumb = document.getElementById('preview-thumb');
  photoInput.addEventListener('change', () => {
    const file = photoInput.files[0];
    if (file) {
      const url = URL.createObjectURL(file);
      previewThumb.src = url;
      previewThumb.style.display = 'block';
      document.querySelector('.upload-icon').style.display = 'none';
    }
  });

  // Form submit
  document.getElementById('signup-form').addEventListener('submit', function(e) {
    e.preventDefault();

    const name    = document.getElementById('name').value.trim();
    const email   = document.getElementById('email').value.trim();
    const phone   = document.getElementById('phone').value.trim();
    const address = document.getElementById('address').value.trim();
    const file    = photoInput.files[0];

    if (!name || !email) {
      document.getElementById('name').classList.add('is-invalid');
      document.getElementById('email').classList.add('is-invalid');
      return;
    }

    // Populate card
    document.getElementById('card-name').textContent  = name;
    document.getElementById('card-email').textContent = email;

    const phoneEl   = document.getElementById('card-phone');
    const addressEl = document.getElementById('card-address');
    phoneEl.textContent   = phone   || '—';
    addressEl.textContent = address || '—';
    phoneEl.className   = 'info-value' + (phone   ? '' : ' empty');
    addressEl.className = 'info-value' + (address ? '' : ' empty');

    // Avatar
    const avatarWrap = document.getElementById('avatar-wrap');
    if (file) {
      const img = document.createElement('img');
      img.src = URL.createObjectURL(file);
      img.alt = name;
      avatarWrap.innerHTML = '';
      avatarWrap.appendChild(img);
    } else {
      const initial = name.charAt(0).toUpperCase();
      avatarWrap.innerHTML = `<div class="avatar-placeholder">${initial}</div>`;
    }

    // Timestamp
    document.getElementById('card-time').textContent =
      new Date().toLocaleString('en-US', { month:'short', day:'numeric', year:'numeric', hour:'2-digit', minute:'2-digit' });

    // Show
    const section = document.getElementById('result-section');
    section.style.display = 'block';
    section.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });

  // Remove invalid on input
  ['name','email'].forEach(id => {
    document.getElementById(id).addEventListener('input', function() {
      this.classList.remove('is-invalid');
    });
  });
</script>
</body>
</html>
