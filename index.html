<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — Members</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --ink:          #0f0e0d;
      --cream:        #f5f0e8;
      --warm:         #ede6d8;
      --gold:         #c9a84c;
      --gold-light:   #e8c97a;
      --gold-soft:    rgba(201,168,76,0.12);
      --rust:         #b85c38;
      --dark-surface: #1a1814;
      --card-bg:      #ffffff;
      --shadow-sm:    0 4px 16px rgba(0,0,0,0.07);
      --shadow-md:    0 12px 40px rgba(0,0,0,0.10);
      --shadow-lg:    0 20px 60px rgba(0,0,0,0.13);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--cream);
      background-image:
        radial-gradient(ellipse 70% 40% at 20% 10%, rgba(201,168,76,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 90%, rgba(184,92,56,0.05) 0%, transparent 60%);
      min-height: 100vh;
      color: var(--ink);
    }

    /* ── Page header ── */
    .page-header {
      text-align: center;
      padding: 4rem 1rem 3rem;
    }
    .eyebrow {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.6rem;
    }
    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 5vw, 3.4rem);
      font-weight: 700;
      color: var(--ink);
      line-height: 1.08;
      margin-bottom: 0.75rem;
    }
    .page-header .sub {
      font-size: 0.9rem;
      color: #7a6f60;
      font-weight: 300;
      max-width: 380px;
      margin: 0 auto;
      line-height: 1.6;
    }
    .divider {
      display: flex; align-items: center; justify-content: center;
      gap: 0.75rem; margin: 1.25rem auto 0; width: fit-content;
    }
    .divider span { display: block; width: 48px; height: 1px; background: var(--gold); opacity: 0.45; }

    /* ── Form card ── */
    .form-card {
      background: var(--card-bg);
      border-radius: 3px;
      box-shadow: var(--shadow-lg), inset 0 0 0 1px rgba(201,168,76,0.13);
      padding: 2.5rem;
      position: relative;
      overflow: hidden;
      max-width: 620px;
      margin: 0 auto 4rem;
    }
    .form-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--gold), var(--rust), var(--gold));
    }

    .field-label {
      font-size: 0.62rem; font-weight: 600; letter-spacing: 0.28em;
      text-transform: uppercase; color: var(--gold);
      display: block; margin-bottom: 0.8rem;
    }

    .form-floating label { font-size: 0.82rem; font-weight: 400; color: #999; }
    .form-floating > .form-control,
    .form-floating > textarea {
      border: 1px solid #e2dbd0; border-radius: 2px;
      background: #fdfcfa; font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem; color: var(--ink);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-floating > .form-control:focus,
    .form-floating > textarea:focus {
      border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.11);
      background: #fff;
    }
    textarea.form-control { resize: none; }

    /* Upload */
    .upload-zone {
      border: 1.5px dashed #d6ccbc; border-radius: 2px; background: #fdfcfa;
      padding: 1.4rem; text-align: center; cursor: pointer;
      transition: border-color 0.2s, background 0.2s; position: relative;
    }
    .upload-zone:hover { border-color: var(--gold); background: #fffef8; }
    .upload-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .upload-icon { font-size: 1.7rem; display: block; margin-bottom: 0.35rem; }
    .upload-text { font-size: 0.8rem; color: #999; }
    .upload-text strong { color: var(--gold); font-weight: 500; }
    #preview-thumb {
      width: 60px; height: 60px; border-radius: 50%; object-fit: cover;
      border: 2px solid var(--gold); display: none; margin: 0.6rem auto 0;
    }

    /* Button */
    .btn-submit {
      background: var(--ink); color: var(--cream); border: none; border-radius: 2px;
      font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: 0.82rem;
      letter-spacing: 0.14em; text-transform: uppercase; padding: 0.88rem 2rem;
      width: 100%; position: relative; overflow: hidden;
      transition: background 0.2s, transform 0.12s;
    }
    .btn-submit::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,0.16), transparent);
      transform: translateX(-100%); transition: transform 0.5s ease;
    }
    .btn-submit:hover { background: #2a2620; transform: translateY(-1px); }
    .btn-submit:hover::after { transform: translateX(100%); }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ── Members section ── */
    .members-wrap { padding: 0 1rem 5rem; }
    .members-head {
      display: flex; align-items: flex-end; justify-content: space-between;
      flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid rgba(201,168,76,0.18);
    }
    .members-head h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.75rem; font-weight: 700; color: var(--ink); line-height: 1;
    }
    .members-head h2 em { font-style: italic; color: var(--gold); }
    .head-right { display: flex; gap: 0.5rem; align-items: center; }
    .pill {
      font-size: 0.68rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--gold); background: var(--gold-soft);
      border: 1px solid rgba(201,168,76,0.28); padding: 0.28rem 0.75rem; border-radius: 999px;
    }
    .btn-refresh {
      background: transparent; border: 1px solid rgba(201,168,76,0.35); color: var(--gold);
      border-radius: 2px; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 0.32rem 0.8rem; cursor: pointer; transition: background 0.2s;
    }
    .btn-refresh:hover { background: var(--gold-soft); }

    /* ── Cards grid ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.25rem;
      margin-bottom: 2.5rem;
    }

    /* ── Profile card ── */
    .profile-card {
      background: var(--dark-surface);
      border-radius: 3px; overflow: hidden;
      box-shadow: var(--shadow-md);
      transition: transform 0.22s ease, box-shadow 0.22s ease;
      animation: cardUp 0.45s cubic-bezier(0.22,1,0.36,1) both;
    }
    .profile-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.18);
    }
    @keyframes cardUp {
      from { opacity:0; transform:translateY(20px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .card-banner {
      height: 64px;
      background: linear-gradient(135deg, #1a1410 0%, #2e2418 60%, #1a1410 100%);
      position: relative;
    }
    .card-banner::after {
      content: ''; position: absolute; inset: 0;
      background: repeating-linear-gradient(
        45deg, transparent, transparent 10px,
        rgba(201,168,76,0.035) 10px, rgba(201,168,76,0.035) 11px
      );
    }
    .avatar-wrap {
      width: 64px; height: 64px; border-radius: 50%;
      border: 2.5px solid var(--gold); overflow: hidden;
      position: absolute; bottom: -32px; left: 1.25rem;
      background: #2a2620; z-index: 1;
      box-shadow: 0 4px 16px rgba(0,0,0,0.45);
    }
    .avatar-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .avatar-placeholder {
      width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--gold); background: #2a2620;
    }

    .card-body { padding: 2.6rem 1.25rem 1.1rem; }
    .card-name {
      font-family: 'Playfair Display', serif; font-size: 1.15rem; font-weight: 700;
      color: #f5f0e8; line-height: 1.2; margin-bottom: 0.15rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-email {
      font-size: 0.72rem; color: var(--gold-light); letter-spacing: 0.025em;
      margin-bottom: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
    .meta-label {
      font-size: 0.56rem; font-weight: 600; letter-spacing: 0.24em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 0.12rem;
    }
    .meta-value { font-size: 0.78rem; color: #b8ad9e; font-weight: 300; line-height: 1.35; word-break: break-word; }
    .meta-value.empty { color: #4a4540; font-style: italic; }

    .card-footer {
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 0.7rem 1.25rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .badge-reg {
      font-size: 0.58rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
      background: rgba(201,168,76,0.13); color: var(--gold-light);
      border: 1px solid rgba(201,168,76,0.28); padding: 0.18rem 0.5rem; border-radius: 1px;
    }
    .card-ts { font-size: 0.63rem; color: #5a5248; }

    /* ── Pagination ── */
    .pagination-wrap {
      display: flex; align-items: center; justify-content: center;
      gap: 0.35rem; flex-wrap: wrap; padding-top: 0.5rem;
    }
    .pg-btn {
      min-width: 36px; height: 36px; padding: 0 0.5rem;
      background: var(--card-bg); border: 1px solid #e0d9cf;
      color: #8a7f70; border-radius: 2px; font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem; font-weight: 500; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      transition: all 0.18s;
    }
    .pg-btn:hover:not(:disabled) { border-color: var(--gold); color: var(--gold); background: var(--gold-soft); }
    .pg-btn.active { background: var(--ink); border-color: var(--ink); color: var(--cream); font-weight: 600; }
    .pg-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .pg-sep { font-size: 0.8rem; color: #c0b8a8; padding: 0 0.1rem; }

    /* ── States ── */
    .state-box {
      text-align: center; padding: 4rem 1rem;
      border: 1px dashed rgba(201,168,76,0.22); border-radius: 3px;
      background: rgba(255,255,255,0.5);
    }
    .state-icon { font-size: 2.2rem; margin-bottom: 0.6rem; }
    .state-text { font-size: 0.85rem; color: #9a9080; }
    .spinner {
      display: inline-block; width: 20px; height: 20px;
      border: 2px solid rgba(201,168,76,0.25); border-top-color: var(--gold);
      border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toast ── */
    .toast-wrap { position: fixed; top: 1.25rem; right: 1.25rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; }
    .toast-msg {
      padding: 0.8rem 1.1rem; border-radius: 2px; font-size: 0.82rem; font-weight: 500;
      display: flex; align-items: center; gap: 0.55rem;
      box-shadow: 0 8px 28px rgba(0,0,0,0.14); animation: toastIn 0.3s ease both; min-width: 230px;
    }
    .toast-msg.success { background: #1a1814; color: var(--gold-light); border-left: 3px solid var(--gold); }
    .toast-msg.error   { background: #1a1814; color: #f08070; border-left: 3px solid var(--rust); }
    .toast-msg.loading { background: #1a1814; color: #c0b8a8; border-left: 3px solid #666; }
    @keyframes toastIn { from { opacity:0; transform:translateX(14px); } to { opacity:1; transform:translateX(0); } }

    @media (max-width: 576px) {
      .form-card { padding: 1.5rem; }
      .cards-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="toast-wrap" id="toast-wrap"></div>

<!-- Header -->
<div class="page-header">
  <p class="eyebrow">Member Registration</p>
  <h1>Join Us Today</h1>
  <p class="sub">Fill in your details to become a registered member of our community.</p>
  <div class="divider">
    <span></span>
    <svg width="6" height="6" viewBox="0 0 6 6"><rect x="1" y="1" width="4" height="4" fill="#c9a84c" transform="rotate(45 3 3)"/></svg>
    <span></span>
  </div>
</div>

<div class="container" style="max-width:1200px;">

  <!-- Form -->
  <div class="form-card">
    <form id="signup-form" novalidate>

      <span class="field-label">Personal Info</span>
      <div class="row g-3 mb-3">
        <div class="col-sm-6">
          <div class="form-floating">
            <input type="text" class="form-control" id="name" placeholder="Full Name" required/>
            <label for="name">Full Name *</label>
          </div>
        </div>
        <div class="col-sm-6">
          <div class="form-floating">
            <input type="email" class="form-control" id="email" placeholder="Email" required/>
            <label for="email">Email Address *</label>
          </div>
        </div>
      </div>

      <span class="field-label mt-1">Contact</span>
      <div class="row g-3 mb-3">
        <div class="col-sm-6">
          <div class="form-floating">
            <input type="tel" class="form-control" id="phone" placeholder="Phone"/>
            <label for="phone">Phone (optional)</label>
          </div>
        </div>
        <div class="col-sm-6">
          <div class="form-floating">
            <textarea class="form-control" id="address" placeholder="Address" style="height:80px"></textarea>
            <label for="address">Address</label>
          </div>
        </div>
      </div>

      <span class="field-label mt-1">Profile Photo</span>
      <div class="upload-zone mb-4">
        <input type="file" id="photo" accept="image/*"/>
        <span class="upload-icon" id="upload-icon">📷</span>
        <p class="upload-text mb-0"><strong>Click to upload</strong> or drag & drop<br>
        <span style="font-size:0.72rem;opacity:0.7;">PNG, JPG up to 5MB</span></p>
        <img id="preview-thumb" alt="preview"/>
      </div>

      <button type="submit" class="btn-submit" id="submit-btn">Register Now</button>
    </form>
  </div>

  <!-- Members -->
  <div class="members-wrap">
    <div class="members-head">
      <h2>Registered <em>Members</em></h2>
      <div class="head-right">
        <span class="pill" id="pill-count">— members</span>
        <button class="btn-refresh" onclick="loadAllSignups()">↻ Refresh</button>
      </div>
    </div>

    <div id="cards-container">
      <div class="state-box">
        <div class="state-icon"><span class="spinner"></span></div>
        <p class="state-text">Loading members…</p>
      </div>
    </div>

    <div class="pagination-wrap" id="pagination"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // ══════════════════════════════════════════
  const SHEET_URL = "https://script.google.com/macros/s/AKfycby1mWYm7Yu6B1JsvqZgqO4sGL5AfT9Xkvw-pBG-USomZ01795K5D2bnUIfmn_fzf9A/exec";
  const PER_PAGE  = 9;
  // ══════════════════════════════════════════

  let allMembers  = [];
  let currentPage = 1;

  /* Toast */
  function toast(msg, type = 'success', ms = 4000) {
    const icons = { success: '✓', error: '✕', loading: '⏳' };
    const el = document.createElement('div');
    el.className = `toast-msg ${type}`;
    el.innerHTML = `<span>${icons[type]}</span>${msg}`;
    document.getElementById('toast-wrap').appendChild(el);
    if (ms) setTimeout(() => el.remove(), ms);
    return el;
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function cleanPhone(p) {
    if (!p) return '';
    if (String(p).includes('#') || String(p).toUpperCase().includes('ERROR')) return '';
    return String(p).trim();
  }

  /* Build card */
  function buildCard(m, delay) {
    const initial  = (m.name || '?').charAt(0).toUpperCase();
    const phone    = cleanPhone(m.phone);
    const address  = String(m.address || '').trim();
    const imageUrl = String(m.imageUrl || '').trim();

    const avatarInner = imageUrl
      ? `<img src="${esc(imageUrl)}" alt="${esc(m.name)}" onerror="this.outerHTML='<div class=\\'avatar-placeholder\\'>${initial}</div>'">`
      : `<div class="avatar-placeholder">${initial}</div>`;

    const card = document.createElement('div');
    card.className = 'profile-card';
    card.style.animationDelay = delay + 'ms';
    card.innerHTML = `
      <div class="card-banner" style="position:relative;">
        <div class="avatar-wrap">${avatarInner}</div>
      </div>
      <div class="card-body">
        <div class="card-name" title="${esc(m.name)}">${esc(m.name)}</div>
        <div class="card-email" title="${esc(m.email)}">${esc(m.email)}</div>
        <div class="card-meta">
          <div>
            <div class="meta-label">Phone</div>
            <div class="meta-value ${phone ? '' : 'empty'}">${phone ? esc(phone) : '—'}</div>
          </div>
          <div>
            <div class="meta-label">Location</div>
            <div class="meta-value ${address ? '' : 'empty'}">${address ? esc(address) : '—'}</div>
          </div>
        </div>
      </div>
      <div class="card-footer">
        <span class="badge-reg">✓ Registered</span>
        <span class="card-ts">${esc(m.timestamp)}</span>
      </div>`;
    return card;
  }

  /* Render page */
  function renderPage(page) {
    currentPage = page;
    const container = document.getElementById('cards-container');
    const slice = allMembers.slice((page - 1) * PER_PAGE, page * PER_PAGE);

    // build grid
    const grid = document.createElement('div');
    grid.className = 'cards-grid';
    slice.forEach((m, i) => grid.appendChild(buildCard(m, i * 45)));
    container.innerHTML = '';
    container.appendChild(grid);
    renderPagination();

    // smooth scroll to members on page change (not on first load)
    if (page > 1 || currentPage > 1) {
      document.getElementById('cards-container').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }

  /* Pagination */
  function renderPagination() {
    const total = Math.ceil(allMembers.length / PER_PAGE);
    const pg = document.getElementById('pagination');
    pg.innerHTML = '';
    if (total <= 1) return;

    const mkBtn = (label, page, active, disabled) => {
      const b = document.createElement('button');
      b.className = 'pg-btn' + (active ? ' active' : '');
      b.textContent = label;
      b.disabled = disabled;
      if (!disabled && !active) b.onclick = () => renderPage(page);
      return b;
    };

    pg.appendChild(mkBtn('←', currentPage - 1, false, currentPage === 1));

    pageRange(currentPage, total).forEach(p => {
      if (p === '…') {
        const sep = document.createElement('span');
        sep.className = 'pg-sep'; sep.textContent = '…';
        pg.appendChild(sep);
      } else {
        pg.appendChild(mkBtn(p, p, p === currentPage, false));
      }
    });

    pg.appendChild(mkBtn('→', currentPage + 1, false, currentPage === total));
  }

  function pageRange(cur, total) {
    if (total <= 7) return Array.from({length: total}, (_, i) => i + 1);
    if (cur <= 4)   return [1,2,3,4,5,'…',total];
    if (cur >= total - 3) return [1,'…',total-4,total-3,total-2,total-1,total];
    return [1,'…',cur-1,cur,cur+1,'…',total];
  }

  /* Load all */
  async function loadAllSignups() {
    const container = document.getElementById('cards-container');
    container.innerHTML = `<div class="state-box"><div class="state-icon"><span class="spinner"></span></div><p class="state-text">Loading members…</p></div>`;
    document.getElementById('pagination').innerHTML = '';

    try {
      const res  = await fetch(SHEET_URL);
      const json = await res.json();

      if (!json.data || json.data.length === 0) {
        container.innerHTML = `<div class="state-box"><div class="state-icon">👥</div><p class="state-text">No members yet — be the first to register!</p></div>`;
        document.getElementById('pill-count').textContent = '0 members';
        return;
      }

      allMembers = [...json.data].reverse();
      const c = allMembers.length;
      document.getElementById('pill-count').textContent = c + (c === 1 ? ' member' : ' members');
      renderPage(1);

    } catch(err) {
      container.innerHTML = `<div class="state-box"><div class="state-icon">⚠️</div><p class="state-text">Could not load members. Check your Apps Script URL.</p></div>`;
      console.error(err);
    }
  }

  /* Photo preview */
  const photoInput  = document.getElementById('photo');
  const previewThumb = document.getElementById('preview-thumb');
  photoInput.addEventListener('change', () => {
    const file = photoInput.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) {
      toast('Image too large. Max 5MB.', 'error'); photoInput.value = ''; return;
    }
    previewThumb.src = URL.createObjectURL(file);
    previewThumb.style.display = 'block';
    document.getElementById('upload-icon').style.display = 'none';
  });

  function toBase64(file) {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload  = () => res(r.result.split(',')[1]);
      r.onerror = rej;
      r.readAsDataURL(file);
    });
  }

  /* Submit */
  document.getElementById('signup-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const nameEl  = document.getElementById('name');
    const emailEl = document.getElementById('email');
    const name    = nameEl.value.trim();
    const email   = emailEl.value.trim();
    const phone   = document.getElementById('phone').value.trim();
    const address = document.getElementById('address').value.trim();
    const file    = photoInput.files[0];
    const btn     = document.getElementById('submit-btn');

    nameEl.classList.toggle('is-invalid', !name);
    emailEl.classList.toggle('is-invalid', !email);
    if (!name || !email) return;

    btn.disabled = true; btn.textContent = 'Registering…';
    const t = toast('Saving your registration…', 'loading', 0);

    const timestamp = new Date().toLocaleString('en-US', {
      month:'short', day:'numeric', year:'numeric', hour:'2-digit', minute:'2-digit'
    });

    const payload = { timestamp, name, email, phone, address };
    if (file) {
      try {
        payload.imageBase64 = await toBase64(file);
        payload.imageName   = file.name;
        payload.imageMime   = file.type;
      } catch(err) { console.warn('Image encode failed', err); }
    }

    try {
      await fetch(SHEET_URL, {
        method: 'POST', mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      t.remove();
      toast('✓ Registered successfully!', 'success');
      this.reset();
      previewThumb.style.display = 'none';
      document.getElementById('upload-icon').style.display = 'block';
      setTimeout(() => loadAllSignups(), 2500);
    } catch(err) {
      t.remove();
      toast('Failed to register. Please try again.', 'error');
      console.error(err);
    }

    btn.disabled = false; btn.textContent = 'Register Now';
  });

  ['name','email'].forEach(id => {
    document.getElementById(id).addEventListener('input', function() {
      this.classList.remove('is-invalid');
    });
  });

  loadAllSignups();
</script>
</body>
</html>
